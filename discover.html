<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why I Chose UMD and Duluth</title>
    <style>
        :root {
            --primary-color: #2d3436;
            --accent-color: #0984e3;
            --bg-gradient: linear-gradient(135deg, #74b9ff, #0984e3);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--primary-color);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            color: white;
        }

        .section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .section-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--accent-color);
        }

        .section-description {
            font-size: 1.1rem;
            color: #636e72;
            margin-bottom: 2rem;
        }

        .video-container {
            width: 100%;
            max-width: 800px;
            margin: 2rem auto;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        .back-button {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--bg-gradient);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            margin-bottom: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .back-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(9, 132, 227, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button">← Back to Home</a>
        
        <header class="header">
            <h1>Why I Chose UMD and Duluth</h1>
        </header>

        <section class="section">
            <h2 class="section-title">Why I Chose UMD</h2>
            <img src="images/placeholder1.jpg" alt="UMD Campus" class="section-image">
            <p class="section-description">Add your description about why you chose UMD.</p>
        </section>

        <section class="section">
            <h2 class="section-title">What I Like About the Duluth Area</h2>
            <img src="images/placeholder2.jpg" alt="Duluth Area" class="section-image">
            <p class="section-description">Add your description about what you like about the Duluth area.</p>
        </section>

        <section class="section">
            <h2 class="section-title">Experience Duluth</h2>
            <div class="video-container">
                <video controls>
                    <source src="videos/duluth-video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </section>
    </div>
</body>
</html>
